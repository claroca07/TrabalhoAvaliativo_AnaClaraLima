<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tatto</title>
    <link rel="stylesheet" href="../estilos/layout.css">
    <link rel="shortcut icon" href="../imagens/tatuagem.ico">

</head>

<body>

    <nav>
        <header>
            <figure>
                <img src="../imagens/logo.png" alt="Logo" width="120">
                <h1>Tatto Studio</h1>
            </figure>
        </header>
        <ul>
            <li>
                <a href="../index.html">Home</a>
            </li>

            <li class="dropdown" onclick="abrirMenu(event)">

                <article>
                    <p>Mural</p>
                    <img src="../imagens/seta-direita.png" alt="Seta" width="12" class="arrow">
                </article>

                <ul class="submenu">
                    <li>
                        <a href="pele-artificial.html">Pele artificial</a>
                    </li>

                    <li>
                        <a href="pele-real.html">Pele real</a>
                    </li>
                </ul>
            </li>

            <li>
                <a href="./sobre.html">Sobre</a>
            </li>
            <li>
                <a href="./contato.html">Contato</a>
            </li>
        </ul>
    </nav>

    <main>
        <form action="contato.html" method="post">
            <fieldset>
                <legend>Dados para contato</legend>

                <label for="lbnome">Nome:</label>
                <input type="text" id="ipnome" name="nome" required>

                <label for="lbemail">Email:</label>
                <input type="email" id="ipemail" name="email" required>

                <label for="lbassunto">Assunto:</label>
                <select id="ipassunto" name="assunto" required>
                    <option value="">Selecione...</option>
                    <option value="tatuagem">Tatuagem</option>
                    <option value="elogio">Elogio</option>
                    <option value="critica">Crítica</option>
                    <option value="outros">Outros</option>
                </select>

                <article id="bloco-tatto" style="display:none;">
                    <label for="lbdata">Data desejada:</label>
                    <input type="date" id="ipdata" name="data" required>

                    <label for="lbhora">Horário:</label>
                    <input type="time" id="iphora" name="hora" required>
                </article>


                <label for="lbmensagem">Mensagem:</label>
                <textarea id="ipmensagem" name="mensagem" rows="4"></textarea>

                <article style="display: flex; align-items: center; gap: 10px; margin-top: 20px;">
                    <label for="lbgostaria">Gostaria de receber novidades por email?</label>
                    <input type="checkbox" id="ipgostaria" name="gostaria">
                </article>

                <article class="form-actions">
                    <button type="button" onclick="enviarDados(event)">Enviar</button>
                    <button type="reset" onclick="limparTela(event)">Limpar</button>
                </article>
            </fieldset>
        </form>

        <article id="resposta" style="display:none; margin-top: 30px;"></article>

    </main>

    <aside>
        <section>
            <article>
                <h3>Me acompanhe nas redes sociais</h3>
                <ul>
                    <li>
                        <a href="https://www.instagram.com/clarocao/" target="_blank">
                            Instagram
                            <img src="../imagens/insta.png" alt="Instagram" width="16">
                        </a>
                    </li>
                    <li>
                        <a href="https://www.tiktok.com/clarocao" target="_blank">
                            TikTok
                            <img src="../imagens/tiktok.png" alt="TikTok" width="16">
                        </a>
                    </li>
                </ul>
            </article>
            <article>
                <h3>
                    Registros recentes:
                </h3>
                <figure>
                    <img src="../imagens/registro-1.jpg" alt="Registro 1" width="100%">
                    <figcaption>Trabalho recente: tatuagem de flor aquarela</figcaption>
                </figure>
                <figure>
                    <img src="../imagens/registro-2.jpeg" alt="Registro 2" width="100%">
                    <figcaption>Trabalho recente: tatuagem de animal em estilo realista</figcaption>
                </figure>
            </article>
        </section>
    </aside>

</body>

</html>
